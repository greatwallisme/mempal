[workspace]
members = [
    "crates/mempal-core",
    "crates/mempal-embed",
    "crates/mempal-ingest",
    "crates/mempal-search",
    "crates/mempal-cli",
    "crates/mempal-aaak",
    "crates/mempal-mcp",
    "crates/mempal-api",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"
license = "MIT"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
ort = "2.0.0-rc.9"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
